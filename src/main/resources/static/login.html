<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to SpendWise — your smart subscription and expense control room." />
  <title>SpendWise – Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="auth-body">

  <div class="auth-wrap">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="/images/Logo.png" alt="SpendWise Logo" />
      <div class="auth-logo-name">SpendWise</div>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Flash messages -->
      <div id="msg-area"></div>

      <!-- ══ LOGIN FORM ══ -->
      <form id="form-login" action="/auth/login" method="POST">
        <div class="auth-form-group">
          <label for="l-email">Email Address</label>
          <input class="form-control" id="l-email" name="email" type="email"
            placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="auth-form-group">
          <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;">
            <label for="l-password" style="margin-bottom:0;">Password</label>
            <a href="/forgot-password" class="forgot-link">Forgot password?</a>
          </div>
          <div class="input-wrap">
            <input class="form-control" id="l-password" name="password" type="password"
              placeholder="••••••••" required autocomplete="current-password"
              style="padding-right:52px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('l-password', this)">Show</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary"
          style="width:100%; justify-content:center; margin-top:4px;">
          Sign In →
        </button>
      </form>

      <!-- ══ SIGNUP FORM ══ -->
      <form id="form-signup" action="/auth/signup" method="POST" style="display:none;"
        onsubmit="return validateSignup()">

        <div class="auth-form-group">
          <label for="s-name">Full Name</label>
          <input class="form-control" id="s-name" name="name" type="text"
            placeholder="Your Name" required autocomplete="name" />
        </div>

        <div class="auth-form-group">
          <label for="s-email">Email Address</label>
          <input class="form-control" id="s-email" name="email" type="email"
            placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="auth-form-group">
          <label for="s-password">Password</label>
          <div class="input-wrap">
            <input class="form-control" id="s-password" name="password" type="password"
              placeholder="Min. 6 characters" required autocomplete="new-password"
              oninput="updateStrength(this.value)" style="padding-right:52px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('s-password', this)">Show</button>
          </div>
          <div class="strength-bar" id="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <div class="strength-label" id="strength-label" style="color:var(--text4);"></div>
        </div>

        <div class="auth-form-group">
          <label for="s-confirm">Confirm Password</label>
          <div class="input-wrap">
            <input class="form-control" id="s-confirm" name="confirm_password" type="password"
              placeholder="Repeat password" required autocomplete="new-password"
              style="padding-right:52px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('s-confirm', this)">Show</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary"
          style="width:100%; justify-content:center; margin-top:4px;">
          Create Account →
        </button>
      </form>

      <!-- ══ OAUTH ══ -->
      <div id="oauth-section" style="margin-top:24px;">
        <div class="oauth-divider">
          <div class="oauth-divider-line"></div>
          <div class="oauth-divider-text">OR</div>
          <div class="oauth-divider-line"></div>
        </div>
        <a href="/oauth2/authorization/google" class="btn-google">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18px" height="18px">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </a>
      </div>

    </div><!-- /auth-card -->

    <div class="auth-footer" id="footer-link">
      Don't have an account? <a href="#" onclick="showTab('signup'); return false;">Sign up free</a>
    </div>

  </div><!-- /auth-wrap -->

  <script>
    // ── URL params ─────────────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    if (params.get('mode') === 'signup') showTab('signup');

    const msgArea = document.getElementById('msg-area');

    if (params.get('error') === 'true')
      showMsg('error', 'Incorrect email or password. Please try again.');
    if (params.get('logout') === 'true')
      showMsg('info', 'You have been signed out successfully.');
    if (params.get('resetSuccess') === 'true')
      showMsg('success', 'Password successfully reset. You can now sign in.');

    const flashErr = sessionStorage.getItem('signupError');
    if (flashErr) {
      showMsg('error', flashErr);
      sessionStorage.removeItem('signupError');
      showTab('signup');
    }

    function showMsg(type, text) {
      const cls = type === 'error' ? 'auth-alert-error'
                : type === 'success' ? 'auth-alert-success'
                : 'auth-alert-info';
      msgArea.innerHTML = `<div class="${cls}">${text}</div>`;
    }

    // ── Tab switch ──────────────────────────────────────────────────────────
    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').style.display  = isLogin ? '' : 'none';
      document.getElementById('form-signup').style.display = isLogin ? 'none' : '';
      document.getElementById('footer-link').innerHTML = isLogin
        ? `Don't have an account? <a href="#" onclick="showTab('signup');return false;">Sign up free</a>`
        : `Already have an account? <a href="#" onclick="showTab('login');return false;">Sign in</a>`;
      msgArea.innerHTML = '';
    }

    // ── Password show/hide ─────────────────────────────────────────────────
    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    }

    // ── Password strength ──────────────────────────────────────────────────
    function updateStrength(val) {
      const bar = document.getElementById('strength-bar');
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      bar.style.display = val.length ? 'block' : 'none';

      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '20%', color: 'var(--danger)',  text: 'Weak' },
        { pct: '40%', color: '#f97316',        text: 'Fair' },
        { pct: '60%', color: 'var(--warning)', text: 'Good' },
        { pct: '80%', color: 'var(--success)', text: 'Strong' },
        { pct: '100%',color: 'var(--color-signal-violet)', text: 'Very Strong' },
      ];
      const lv = levels[Math.max(0, score - 1)];
      fill.style.width = lv.pct;
      fill.style.background = lv.color;
      label.textContent = lv.text;
      label.style.color = lv.color;
    }

    // ── Signup validation ──────────────────────────────────────────────────
    function validateSignup() {
      const pwd  = document.getElementById('s-password').value;
      const conf = document.getElementById('s-confirm').value;
      if (pwd.length < 6) { showMsg('error', 'Password must be at least 6 characters.'); return false; }
      if (pwd !== conf)   { showMsg('error', 'Passwords do not match.'); return false; }
      return true;
    }
  </script>
</body>

</html>

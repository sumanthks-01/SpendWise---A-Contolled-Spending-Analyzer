<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise – Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      animation: fadeUp .45s ease both;
      z-index: 10;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Logo ── */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-name {
      font-size: 1.7rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      color: var(--text2);
      font-size: .82rem;
      margin-top: 4px;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 18px;
    }

    .input-wrap {
      position: relative;
    }

    /* password toggle */
    .pwd-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px;
      transition: color .2s;
    }

    .pwd-toggle:hover {
      color: var(--text);
    }

    /* strength bar */
    .strength-bar {
      height: 3px;
      border-radius: 3px;
      margin-top: 7px;
      background: var(--border);
      overflow: hidden;
      display: none;
    }

    .strength-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .3s, background .3s;
    }

    .strength-label {
      font-size: .72rem;
      margin-top: 4px;
    }

    /* ── Alert messages ── */
    .alert-error {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .3);
      color: var(--danger);
    }

    .alert-success {
      background: rgba(16, 185, 129, .12);
      border: 1px solid rgba(16, 185, 129, .3);
      color: var(--success);
    }

    .alert-logout {
      background: rgba(6, 182, 212, .1);
      border: 1px solid rgba(6, 182, 212, .25);
      color: var(--accent2);
    }

    /* ── Footer link ── */
    .footer-text {
      text-align: center;
      margin-top: 24px;
      color: var(--text2);
      font-size: .85rem;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 460px) {
      .card {
        padding: 28px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="auth-wrap">

    <!-- Logo -->
    <div class="logo">
      <img src="/images/Logo.png" alt="SpendWise Logo"
        style="height: 80px; width: auto; max-width: 100%; object-fit: contain; margin-bottom: 8px;" />
      <div class="logo-name" style="font-size: 1.4rem;">SpendWise</div>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- ── Flash messages ── -->
      <div id="msg-area"></div>

      <!-- ══ LOGIN FORM ══ -->
      <form id="form-login" action="/auth/login" method="POST">
        <div class="form-group">
          <label for="l-email">Email Address</label>
          <input class="form-control" id="l-email" name="email" type="email" placeholder="you@example.com" required
            autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="l-password">Password</label>
          <div class="input-wrap">
            <input class="form-control" id="l-password" name="password" type="password" placeholder="••••••••" required
              autocomplete="current-password" style="padding-right:40px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('l-password', this)">Show</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary"
          style="width: 100%; justify-content: center; margin-top: 8px;">Sign In →</button>
      </form>

      <!-- ══ SIGNUP FORM ══ -->
      <form id="form-signup" action="/auth/signup" method="POST" style="display:none;"
        onsubmit="return validateSignup()">
        <div class="form-group">
          <label for="s-name">Full Name</label>
          <input class="form-control" id="s-name" name="name" type="text" placeholder="Your Name" required
            autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="s-email">Email Address</label>
          <input class="form-control" id="s-email" name="email" type="email" placeholder="you@example.com" required
            autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="s-password">Password</label>
          <div class="input-wrap">
            <input class="form-control" id="s-password" name="password" type="password" placeholder="Min. 6 characters"
              required autocomplete="new-password" oninput="updateStrength(this.value)" style="padding-right:40px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('s-password', this)">Show</button>
          </div>
          <div class="strength-bar" id="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <div class="strength-label" id="strength-label" style="color:var(--text2);"></div>
        </div>
        <div class="form-group">
          <label for="s-confirm">Confirm Password</label>
          <div class="input-wrap">
            <input class="form-control" id="s-confirm" name="confirm_password" type="password"
              placeholder="Repeat password" required autocomplete="new-password" style="padding-right:40px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('s-confirm', this)">Show</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">Create Account →</button>
    </form>

    <!-- ══ OAUTH ══ -->
    <div id="oauth-section" style="margin-top: 20px;">
      <div style="display: flex; align-items: center; margin-bottom: 16px;">
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
        <div style="padding: 0 10px; color: var(--text2); font-size: 0.8rem;">OR</div>
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
      </div>
      <a href="/oauth2/authorization/google" class="btn btn-outline" style="width: 100%; justify-content: center; text-decoration: none; display: flex; align-items: center; gap: 8px; border-radius: 9px; padding: 11px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18px" height="18px">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </a>
    </div>

    </div><!-- /card -->

    <div class="footer-text" id="footer-link">
      Don't have an account? <a href="#" onclick="showTab('signup'); return false;">Sign up free</a>
    </div>

  </div><!-- /auth-wrap -->

  <script>
    // ── Read URL params ───────────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);

    // Show correct tab
    if (params.get('mode') === 'signup') showTab('signup');

    // Flash messages
    const msgArea = document.getElementById('msg-area');

    if (params.get('error') === 'true') {
      showMsg('error', 'Incorrect email or password. Please try again.');
    }
    if (params.get('logout') === 'true') {
      showMsg('logout', 'You have been signed out successfully.');
    }

    // Flash from server redirect (signup errors come via URL fragment hack)
    // The server uses RedirectAttributes → check sessionStorage
    const flashErr = sessionStorage.getItem('signupError');
    if (flashErr) {
      showMsg('error', flashErr);
      sessionStorage.removeItem('signupError');
      showTab('signup');
    }

    function showMsg(type, text) {
      const cls = type === 'logout' ? 'alert-logout' : type === 'error' ? 'alert-error' : 'alert-success';
      msgArea.innerHTML = `<div class="${cls}" style="padding: 11px 14px; border-radius: 9px; font-size: .88rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px;">${text}</div>`;
    }

    // ── Tab switch ────────────────────────────────────────────────────────────
    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').style.display = isLogin ? '' : 'none';
      document.getElementById('form-signup').style.display = isLogin ? 'none' : '';
      document.getElementById('footer-link').innerHTML = isLogin
        ? `Don't have an account? <a href="#" onclick="showTab('signup');return false;">Sign up free</a>`
        : `Already have an account? <a href="#" onclick="showTab('login');return false;">Sign in</a>`;
      msgArea.innerHTML = '';
    }

    // ── Password show/hide ────────────────────────────────────────────────────
    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    }

    // ── Password strength ─────────────────────────────────────────────────────
    function updateStrength(val) {
      const bar = document.getElementById('strength-bar');
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      bar.style.display = val.length ? 'block' : 'none';

      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '20%', color: 'var(--danger)', text: 'Weak' },
        { pct: '40%', color: '#f97316', text: 'Fair' },
        { pct: '60%', color: 'var(--warning)', text: 'Good' },
        { pct: '80%', color: 'var(--success)', text: 'Strong' },
        { pct: '100%', color: 'var(--accent2)', text: 'Very Strong' },
      ];
      const lv = levels[Math.max(0, score - 1)];
      fill.style.width = lv.pct;
      fill.style.background = lv.color;
      label.textContent = lv.text;
      label.style.color = lv.color;
    }

    // ── Signup client-side validation ─────────────────────────────────────────
    function validateSignup() {
      const pwd = document.getElementById('s-password').value;
      const conf = document.getElementById('s-confirm').value;
      if (pwd.length < 6) {
        showMsg('error', 'Password must be at least 6 characters.'); return false;
      }
      if (pwd !== conf) {
        showMsg('error', 'Passwords do not match.'); return false;
      }
      return true;
    }
  </script>
</body>

</html>

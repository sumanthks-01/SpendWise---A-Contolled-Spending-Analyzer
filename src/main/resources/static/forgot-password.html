<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise – Forgot Password</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      animation: fadeUp .45s ease both;
      z-index: 10;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-name {
      font-size: 1.7rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .alert-error {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .3);
      color: var(--danger);
    }

    .alert-success {
      background: rgba(16, 185, 129, .12);
      border: 1px solid rgba(16, 185, 129, .3);
      color: var(--success);
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      color: var(--text2);
      font-size: .85rem;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="auth-wrap">

    <div class="logo">
      <img src="/images/Logo.png" alt="SpendWise Logo"
        style="height: 80px; width: auto; max-width: 100%; object-fit: contain; margin-bottom: 8px;" />
      <div class="logo-name" style="font-size: 1.4rem;">SpendWise</div>
    </div>

    <div class="card">
      <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="font-size: 1.2rem; margin-bottom: 8px;">Reset your password</h2>
        <p style="color: var(--text2); font-size: 0.9rem;">Enter your email address and we'll send you a link to reset your password.</p>
      </div>

      <div id="msg-area"></div>

      <form id="form-forgot" action="/auth/forgot-password" method="POST">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input class="form-control" id="email" name="email" type="email" placeholder="you@example.com" required
            autocomplete="email" />
        </div>
        
        <button type="submit" class="btn btn-primary"
          style="width: 100%; justify-content: center; margin-top: 8px;">Send Reset Link</button>
      </form>
    </div>

    <div class="footer-text">
      <a href="/login">← Back to log in</a>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const msgArea = document.getElementById('msg-area');
    
    if (params.get('success') === 'true') {
      msgArea.innerHTML = `<div class="alert-success" style="padding: 11px 14px; border-radius: 9px; font-size: .88rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px;">If an account exists with that email, a reset link has been sent. Please check your inbox.</div>`;
    }
  </script>
</body>
</html>

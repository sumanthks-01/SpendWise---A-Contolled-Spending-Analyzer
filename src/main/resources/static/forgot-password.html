<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reset your SpendWise password." />
  <title>SpendWise – Forgot Password</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="auth-body">

  <div class="auth-wrap">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="/images/Logo.png" alt="SpendWise Logo" />
      <div class="auth-logo-name">SpendWise</div>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <div style="margin-bottom:24px;">
        <h2 style="font-size:1.15rem; font-weight:600; margin-bottom:8px; letter-spacing:-0.01em;">
          Reset your password
        </h2>
        <p style="color:var(--text3); font-size:.875rem; line-height:1.5;">
          Enter your email address and we'll send you a secure link to reset your password.
        </p>
      </div>

      <div id="msg-area"></div>

      <form id="form-forgot" action="/auth/forgot-password" method="POST">
        <div class="auth-form-group">
          <label for="email">Email Address</label>
          <input class="form-control" id="email" name="email" type="email"
            placeholder="you@example.com" required autocomplete="email" />
        </div>

        <button type="submit" class="btn btn-primary"
          style="width:100%; justify-content:center; margin-top:4px;">
          Send Reset Link →
        </button>
      </form>

    </div><!-- /auth-card -->

    <div class="auth-footer">
      <a href="/login">← Back to sign in</a>
    </div>

  </div><!-- /auth-wrap -->

  <script>
    const params = new URLSearchParams(location.search);
    const msgArea = document.getElementById('msg-area');

    if (params.get('success') === 'true') {
      msgArea.innerHTML = `<div class="auth-alert-success">
        If an account exists with that email, a reset link has been sent. Please check your inbox.
      </div>`;
    }
  </script>
</body>

</html>

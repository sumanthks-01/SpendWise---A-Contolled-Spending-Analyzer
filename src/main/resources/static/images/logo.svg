<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E4C1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Receipt Icon -->
  <g transform="translate(500, 120)">
    <!-- Receipt outline -->
    <rect x="0" y="0" width="250" height="300" rx="10" fill="none" stroke="url(#goldGradient)" stroke-width="18"/>
    <!-- Receipt top bar -->
    <rect x="20" y="20" width="210" height="15" rx="5" fill="url(#goldGradient)"/>
    <!-- Receipt lines -->
    <rect x="20" y="60" width="150" height="12" rx="4" fill="url(#goldGradient)"/>
    <rect x="20" y="100" width="100" height="12" rx="4" fill="url(#goldGradient)"/>
    <rect x="20" y="140" width="80" height="12" rx="4" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Dollar Coin -->
  <g transform="translate(650, 200)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#goldGradient)" stroke-width="16"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="url(#goldGradient)" stroke-width="12"/>
    <!-- Dollar sign -->
    <text x="0" y="35" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle">$</text>
  </g>
  
  <!-- SpendWise Text -->
  <text x="640" y="500" font-family="Georgia, serif" font-size="110" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle">SpendWise</text>
  
  <!-- Smart Expense Tracker Text -->
  <text x="640" y="600" font-family="Georgia, serif" font-size="48" font-weight="normal" fill="url(#goldGradient)" text-anchor="middle">Smart Expense Tracker</text>
</svg>

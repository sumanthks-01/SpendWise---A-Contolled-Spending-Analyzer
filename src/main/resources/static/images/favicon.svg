<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E4C1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Receipt Icon -->
  <g transform="translate(50, 50)">
    <!-- Receipt outline -->
    <rect x="0" y="0" width="150" height="180" rx="8" fill="none" stroke="url(#goldGradient)" stroke-width="12"/>
    <!-- Receipt top bar -->
    <rect x="15" y="15" width="120" height="10" rx="3" fill="url(#goldGradient)"/>
    <!-- Receipt lines -->
    <rect x="15" y="40" width="90" height="8" rx="3" fill="url(#goldGradient)"/>
    <rect x="15" y="65" width="60" height="8" rx="3" fill="url(#goldGradient)"/>
    <rect x="15" y="90" width="50" height="8" rx="3" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Dollar Coin -->
  <g transform="translate(250, 150)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#goldGradient)" stroke-width="12"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#goldGradient)" stroke-width="8"/>
    <!-- Dollar sign -->
    <text x="0" y="25" font-family="Georgia, serif" font-size="60" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle">$</text>
  </g>
</svg>

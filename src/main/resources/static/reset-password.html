<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Set a new password for your SpendWise account." />
  <title>SpendWise – Set New Password</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="auth-body">

  <div class="auth-wrap">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="/images/Logo.png" alt="SpendWise Logo" />
      <div class="auth-logo-name">SpendWise</div>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <div style="margin-bottom:24px;">
        <h2 style="font-size:1.15rem; font-weight:600; margin-bottom:8px; letter-spacing:-0.01em;">
          Create new password
        </h2>
        <p style="color:var(--text3); font-size:.875rem; line-height:1.5;">
          Your new password must be different from previously used passwords.
        </p>
      </div>

      <div id="msg-area"></div>

      <form id="form-reset" action="/auth/reset-password" method="POST" onsubmit="return validateReset()">
        <input type="hidden" id="token" name="token" />

        <div class="auth-form-group">
          <label for="password">New Password</label>
          <div class="input-wrap">
            <input class="form-control" id="password" name="password" type="password"
              placeholder="Min. 6 characters" required autocomplete="new-password"
              oninput="updateStrength(this.value)" style="padding-right:52px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('password', this)">Show</button>
          </div>
          <div class="strength-bar" id="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <div class="strength-label" id="strength-label" style="color:var(--text4);"></div>
        </div>

        <div class="auth-form-group">
          <label for="confirm">Confirm Password</label>
          <div class="input-wrap">
            <input class="form-control" id="confirm" name="confirm_password" type="password"
              placeholder="Repeat password" required autocomplete="new-password"
              style="padding-right:52px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('confirm', this)">Show</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary"
          style="width:100%; justify-content:center; margin-top:4px;">
          Reset Password →
        </button>
      </form>

    </div><!-- /auth-card -->

    <div class="auth-footer">
      <a href="/login">← Back to sign in</a>
    </div>

  </div><!-- /auth-wrap -->

  <script>
    const params  = new URLSearchParams(location.search);
    const token   = params.get('token');
    const msgArea = document.getElementById('msg-area');

    if (token) {
      document.getElementById('token').value = token;
    } else {
      showMsg('error', 'No token provided in the URL.');
      document.getElementById('form-reset').style.display = 'none';
    }

    const error = params.get('error');
    if      (error === 'mismatch') showMsg('error', 'Passwords do not match.');
    else if (error === 'short')    showMsg('error', 'Password must be at least 6 characters.');
    else if (error === 'invalid')  showMsg('error', 'This reset link is invalid or has expired.');

    function showMsg(type, text) {
      const cls = type === 'error' ? 'auth-alert-error' : 'auth-alert-success';
      msgArea.innerHTML = `<div class="${cls}">${text}</div>`;
    }

    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    }

    function updateStrength(val) {
      const bar   = document.getElementById('strength-bar');
      const fill  = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      bar.style.display = val.length ? 'block' : 'none';

      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '20%', color: 'var(--danger)',  text: 'Weak' },
        { pct: '40%', color: '#f97316',        text: 'Fair' },
        { pct: '60%', color: 'var(--warning)', text: 'Good' },
        { pct: '80%', color: 'var(--success)', text: 'Strong' },
        { pct: '100%',color: 'var(--color-signal-violet)', text: 'Very Strong' },
      ];
      const lv = levels[Math.max(0, score - 1)];
      fill.style.width = lv.pct;
      fill.style.background = lv.color;
      label.textContent = lv.text;
      label.style.color = lv.color;
    }

    function validateReset() {
      const pwd  = document.getElementById('password').value;
      const conf = document.getElementById('confirm').value;
      if (pwd.length < 6) { showMsg('error', 'Password must be at least 6 characters.'); return false; }
      if (pwd !== conf)   { showMsg('error', 'Passwords do not match.'); return false; }
      return true;
    }
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise – Set New Password</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      animation: fadeUp .45s ease both;
      z-index: 10;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-name {
      font-size: 1.7rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-group { margin-bottom: 18px; }
    .input-wrap { position: relative; }

    .pwd-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px;
      transition: color .2s;
    }

    .pwd-toggle:hover { color: var(--text); }

    .strength-bar {
      height: 3px;
      border-radius: 3px;
      margin-top: 7px;
      background: var(--border);
      overflow: hidden;
      display: none;
    }

    .strength-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .3s, background .3s;
    }

    .strength-label {
      font-size: .72rem;
      margin-top: 4px;
    }

    .alert-error {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .3);
      color: var(--danger);
    }
  </style>
</head>

<body>

  <div class="auth-wrap">

    <div class="logo">
      <img src="/images/Logo.png" alt="SpendWise Logo"
        style="height: 80px; width: auto; max-width: 100%; object-fit: contain; margin-bottom: 8px;" />
      <div class="logo-name" style="font-size: 1.4rem;">SpendWise</div>
    </div>

    <div class="card">
      <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="font-size: 1.2rem; margin-bottom: 8px;">Create new password</h2>
        <p style="color: var(--text2); font-size: 0.9rem;">Your new password must be different from previous used passwords.</p>
      </div>

      <div id="msg-area"></div>

      <form id="form-reset" action="/auth/reset-password" method="POST" onsubmit="return validateReset()">
        <input type="hidden" id="token" name="token" />
        
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="input-wrap">
            <input class="form-control" id="password" name="password" type="password" placeholder="Min. 6 characters"
              required autocomplete="new-password" oninput="updateStrength(this.value)" style="padding-right:40px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('password', this)">Show</button>
          </div>
          <div class="strength-bar" id="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <div class="strength-label" id="strength-label" style="color:var(--text2);"></div>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <div class="input-wrap">
            <input class="form-control" id="confirm" name="confirm_password" type="password"
              placeholder="Repeat password" required autocomplete="new-password" style="padding-right:40px;" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('confirm', this)">Show</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary"
          style="width: 100%; justify-content: center; margin-top: 8px;">Reset Password</button>
      </form>
    </div>

  </div>

  <script>
    // Read URL params
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    if (token) {
      document.getElementById('token').value = token;
    } else {
      showMsg('error', 'No token provided in the URL.');
      document.getElementById('form-reset').style.display = 'none';
    }

    const error = params.get('error');
    if (error === 'mismatch') showMsg('error', 'Passwords do not match.');
    else if (error === 'short') showMsg('error', 'Password must be at least 6 characters.');
    else if (error === 'invalid') showMsg('error', 'This reset link is invalid or has expired.');

    const msgArea = document.getElementById('msg-area');

    function showMsg(type, text) {
      const cls = type === 'error' ? 'alert-error' : 'alert-success';
      msgArea.innerHTML = `<div class="${cls}" style="padding: 11px 14px; border-radius: 9px; font-size: .88rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px;">${text}</div>`;
    }

    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    }

    function updateStrength(val) {
      const bar = document.getElementById('strength-bar');
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      bar.style.display = val.length ? 'block' : 'none';

      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '20%', color: 'var(--danger)', text: 'Weak' },
        { pct: '40%', color: '#f97316', text: 'Fair' },
        { pct: '60%', color: 'var(--warning)', text: 'Good' },
        { pct: '80%', color: 'var(--success)', text: 'Strong' },
        { pct: '100%', color: 'var(--accent2)', text: 'Very Strong' },
      ];
      const lv = levels[Math.max(0, score - 1)];
      fill.style.width = lv.pct;
      fill.style.background = lv.color;
      label.textContent = lv.text;
      label.style.color = lv.color;
    }

    function validateReset() {
      const pwd = document.getElementById('password').value;
      const conf = document.getElementById('confirm').value;
      if (pwd.length < 6) {
        showMsg('error', 'Password must be at least 6 characters.'); return false;
      }
      if (pwd !== conf) {
        showMsg('error', 'Passwords do not match.'); return false;
      }
      return true;
    }
  </script>
</body>
</html>

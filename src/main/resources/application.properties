# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── H2 Embedded Database (local development — zero setup required) ─────────────
spring.datasource.url=jdbc:h2:file:./spendwise-local
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 web console (http://localhost:8080/h2-console) ─────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── Security ───────────────────────────────────────────────────────────────────
# Prevent Spring Security from locking down the H2 console
spring.security.user.name=admin
spring.security.user.password=ignored

# ── Jackson ────────────────────────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false

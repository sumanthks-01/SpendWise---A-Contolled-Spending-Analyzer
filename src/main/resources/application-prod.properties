# ── PostgreSQL & Database Config ──────────────────────────────────────────────
# The datasource is programmatically configured by DatabaseConfig.java.
# We set the database platform dialect so Hibernate generates correct SQL.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Security & Console Disable ────────────────────────────────────────────────
# Disable the H2 database web console in the production environment
spring.h2.console.enabled=false

# ── Jackson Serialization ─────────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false

# ── Google OAuth2 Settings ────────────────────────────────────────────────────
# Injected securely via Render environment variables
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email

# ── Mail Configuration (Forgot Password) ──────────────────────────────────────
# SMTP server credentials injected via Render environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Base URL Configuration ────────────────────────────────────────────────────
# Base URL of your deployed application on Render.
# If not explicitly defined, it defaults to the placeholder 'https://spendwise.onrender.com'.
app.base-url=${APP_BASE_URL:https://spendwise.onrender.com}
